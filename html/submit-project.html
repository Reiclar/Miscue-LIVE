<div class="class-container">
    <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
        <h1>Submit your project to the Cue</h1>
        <p>Have a project that you think would be a good fit for Miscue? 
        <br>Fill out the form below and we will review it for inclusion in our catalogue.</p>

        <div class="notice">*Note that this form can only be submitted using a secure network.</div>
       
        <input type="hidden" name="access_key" value="d7a6fad9-fcf5-4637-be3d-b66f624af50f">

        <input type="text" name="name" placeholder="First and Last Name" class="contact-inputs" required>
        <input type="email" name="email" placeholder="Email" class="contact-inputs" required>
        <input type="text" name="project_name" placeholder="Project Name" class="contact-inputs" required>
        <textarea name="message" placeholder="Project Description" class="contact-inputs" required></textarea>
        <input type="text" name="project_link" placeholder="Project Link (Optional)" class="contact-inputs">
        <button type="submit">Submit</button>
    </form>
